<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: cabecera('Inicio')}"></head>
<body class="bg-light">
    <nav th:replace="~{fragments :: navbar}"></nav>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4 mt-5">
            <h1>Publicaciones recientes</h1>
        </div>
        <div class="row">


            <div class="col-md-4 mb-4" th:each="post : ${posts}">
                <div class="card h-100 shadow-sm">

                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${post.title}">Título del Post</h5>
                        <p class="card-text" th:text="${#temporals.format(post.createTime, 'dd/MM/yyyy')}">01/01/2026</p>

                        <p class="card-text" th:text="${#strings.abbreviate(post.content, 100)}">Contenido...</p>

                        <div class="mt-auto d-grid gap-2">
                            <a th:href="@{/post/{id}(id=${post.id})}" class="btn btn-primary btn-sm">Leer más</a>

                            <a th:href="@{/eliminar/{id}(id=${post.id})}"
                                class="btn btn-danger btn-sm"
                                onclick="return confirm('¿Seguro que quieres borrar este post?')">
                                Eliminar
                            </a>
                            <a th:href="@{/editar/{id}(id=${post.id})}" class="btn btn-warning btn-sm">Editar</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 text-center" th:if="${posts.isEmpty()}">
                <p class="alert alert-info">Aún no hay publicaciones. ¡Crea la primera!</p>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
